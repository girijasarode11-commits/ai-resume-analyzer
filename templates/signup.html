<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="min-h-screen bg-[#09090B] flex items-center justify-center">

<!-- Background -->
<div class="fixed inset-0 -z-10">
    <div class="absolute top-20 left-20 w-80 h-80 bg-purple-500 rounded-full blur-3xl opacity-20 animate-pulse"></div>
    <div class="absolute bottom-20 right-20 w-80 h-80 bg-cyan-500 rounded-full blur-3xl opacity-20 animate-pulse"></div>
</div>

<div class="w-full max-w-md bg-white/10 backdrop-blur-xl rounded-3xl p-10 border border-white/20 shadow-2xl">

    <h1 class="text-4xl font-bold text-white text-center mb-3">
        Create Account ✨
    </h1>

    <p class="text-center text-gray-300 mb-8">
        Join AI Resume Analyzer
    </p>

    <form method="POST" action="/signup" class="space-y-6" onsubmit="return validateSignup()">

        <!-- Username -->
        <div class="relative">
            <input
                id="username"
                type="text"
                name="username"
                required
                placeholder=" "
                class="peer w-full p-4 rounded-xl bg-white text-black focus:ring-4 focus:ring-cyan-400 outline-none"
            >
            <label class="absolute left-4 top-4 text-gray-500 transition-all
                peer-focus:top-1 peer-focus:text-xs
                peer-valid:top-1 peer-valid:text-xs">
                Username
            </label>
        </div>

        <!-- Email -->
        <div class="relative">
            <input
                id="email"
                type="email"
                name="email"
                required
                placeholder=" "
                class="peer w-full p-4 rounded-xl bg-white text-black focus:ring-4 focus:ring-cyan-400 outline-none"
            >
            <label class="absolute left-4 top-4 text-gray-500 transition-all
                peer-focus:top-1 peer-focus:text-xs
                peer-valid:top-1 peer-valid:text-xs">
                Email
            </label>
        </div>

        <!-- Password -->
        <div class="relative">
            <input
                id="password"
                type="password"
                name="password"
                required
                placeholder=" "
                class="peer w-full p-4 pr-12 rounded-xl bg-white text-black focus:ring-4 focus:ring-purple-400 outline-none"
                onkeyup="checkPasswords()"
            >

            <label class="absolute left-4 top-4 text-gray-500 transition-all
                peer-focus:top-1 peer-focus:text-xs
                peer-valid:top-1 peer-valid:text-xs">
                Password
            </label>

            <button type="button"
                onclick="togglePassword('password')"
                class="absolute right-4 top-4 text-gray-600">
                👁
            </button>
        </div>

        <p class="text-xs text-gray-400 -mt-3">
            Password must have 8+ chars, uppercase, lowercase, number & symbol.
        </p>

        <!-- Confirm Password -->
        <div class="relative">
            <input
                id="confirm_password"
                type="password"
                name="confirm_password"
                required
                placeholder=" "
                class="peer w-full p-4 pr-12 rounded-xl bg-white text-black focus:ring-4 focus:ring-purple-400 outline-none"
                onkeyup="checkPasswords()"
            >

            <label class="absolute left-4 top-4 text-gray-500 transition-all
                peer-focus:top-1 peer-focus:text-xs
                peer-valid:top-1 peer-valid:text-xs">
                Confirm Password
            </label>

            <button type="button"
                onclick="togglePassword('confirm_password')"
                class="absolute right-4 top-4 text-gray-600">
                👁
            </button>
        </div>

        <p id="passwordError" class="text-red-400 text-sm hidden">
            Passwords do not match
        </p>

        <button
            type="submit"
            class="w-full py-4 rounded-xl text-white font-bold bg-gradient-to-r from-cyan-500 to-purple-600 hover:scale-105 transition duration-300"
        >
            Sign Up
        </button>

    </form>

    <p class="text-center text-gray-300 mt-6">
        Already registered?
        <a href="/login" class="text-cyan-400 font-bold hover:underline">Login</a>
    </p>

</div>

<script>
function togglePassword(id) {
    const field = document.getElementById(id);
    field.type = (field.type === "password") ? "text" : "password";
}

function checkPasswords() {
    const pass = document.getElementById("password").value;
    const confirm = document.getElementById("confirm_password").value;
    const error = document.getElementById("passwordError");

    if (confirm && pass !== confirm) {
        error.classList.remove("hidden");
    } else {
        error.classList.add("hidden");
    }
}

function validateSignup() {
    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("password").value;
    const confirm = document.getElementById("confirm_password").value;

    const emailPattern = /^[A-Za-z0-9._%+-]{3,}@[A-Za-z0-9-]{3,}\.[A-Za-z]{2,}$/;
    const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;

    if (!emailPattern.test(email)) {
        Swal.fire({
            icon: "error",
            title: "Invalid Email",
            text: "Enter a valid email like name@gmail.com"
        });
        return false;
    }

    if (!passwordPattern.test(pass)) {
        Swal.fire({
            icon: "error",
            title: "Weak Password",
            text: "Password must have uppercase, lowercase, number and symbol."
        });
        return false;
    }

    if (pass !== confirm) {
        Swal.fire({
            icon: "error",
            title: "Password Mismatch",
            text: "Both passwords must match."
        });
        return false;
    }

    return true;
}
</script>

</body>
</html>
