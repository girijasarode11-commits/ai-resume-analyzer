<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#09090B] min-h-screen flex items-center justify-center text-white">

    <!-- Background -->
    <div class="fixed inset-0 -z-10">
        <div class="absolute top-20 left-20 w-96 h-96 bg-purple-500 rounded-full blur-3xl opacity-20"></div>
        <div class="absolute bottom-20 right-20 w-96 h-96 bg-cyan-500 rounded-full blur-3xl opacity-20"></div>
    </div>

    <div class="w-full max-w-md bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl p-8 shadow-2xl">

        <h1 class="text-3xl font-bold mb-3 text-center">
            Reset Password
        </h1>

        <p class="text-gray-400 text-center mb-6">
            Enter and confirm your new password.
        </p>

        <form method="POST" class="space-y-5" onsubmit="return validateForm()">

            <!-- New Password -->
            <div>
                <label class="block mb-2">New Password</label>

                <div class="relative">
                    <input
                        id="password"
                        type="password"
                        name="password"
                        required
                        onkeyup="liveValidate()"
                        class="w-full p-4 rounded-xl text-black"
                    >

                    <button
                        type="button"
                        onclick="togglePassword('password')"
                        class="absolute right-4 top-4 text-gray-600"
                    >
                        👁
                    </button>
                </div>

                <p class="text-xs text-gray-400 mt-2">
                    Must contain 8+ chars, uppercase, lowercase, number & symbol.
                </p>
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="block mb-2">Confirm Password</label>

                <div class="relative">
                    <input
                        id="confirm_password"
                        type="password"
                        name="confirm_password"
                        required
                        onkeyup="liveValidate()"
                        class="w-full p-4 rounded-xl text-black"
                    >

                    <button
                        type="button"
                        onclick="togglePassword('confirm_password')"
                        class="absolute right-4 top-4 text-gray-600"
                    >
                        👁
                    </button>
                </div>
            </div>

            <p id="error-msg" class="text-red-400 text-sm hidden"></p>
            <p id="success-msg" class="text-green-400 text-sm hidden">
                Passwords match ✓
            </p>

            <button
                type="submit"
                class="w-full py-4 rounded-xl font-bold bg-gradient-to-r from-cyan-500 to-purple-600 hover:scale-[1.02] transition"
            >
                Reset Password
            </button>

        </form>

        <div class="mt-6 text-center">
            <a href="/login" class="text-cyan-400 hover:underline">
                Back to Login
            </a>
        </div>
    </div>

<script>
function togglePassword(id) {
    const field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
}

function isStrongPassword(password) {
    const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;
    return regex.test(password);
}

function liveValidate() {
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm_password").value;

    const error = document.getElementById("error-msg");
    const success = document.getElementById("success-msg");

    error.classList.add("hidden");
    success.classList.add("hidden");

    if (password.length > 0 && !isStrongPassword(password)) {
        error.innerText = "Weak password.";
        error.classList.remove("hidden");
        return;
    }

    if (confirm.length > 0) {
        if (password !== confirm) {
            error.innerText = "Passwords do not match.";
            error.classList.remove("hidden");
        } else if (isStrongPassword(password)) {
            success.classList.remove("hidden");
        }
    }
}

function validateForm() {
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm_password").value;
    const error = document.getElementById("error-msg");

    if (!isStrongPassword(password)) {
        error.innerText =
            "Password must have 8+ chars, uppercase, lowercase, number & symbol.";
        error.classList.remove("hidden");
        return false;
    }

    if (password !== confirm) {
        error.innerText = "Passwords do not match.";
        error.classList.remove("hidden");
        return false;
    }

    return true;
}
</script>

</body>
</html>
