<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="min-h-screen bg-[#09090B] flex items-center justify-center">

<!-- Background -->
<div class="fixed inset-0 -z-10">
    <div class="absolute top-20 left-20 w-80 h-80 bg-purple-500 rounded-full blur-3xl opacity-20 animate-pulse"></div>
    <div class="absolute bottom-20 right-20 w-80 h-80 bg-cyan-500 rounded-full blur-3xl opacity-20 animate-pulse"></div>
</div>

<div class="w-full max-w-md bg-white/10 backdrop-blur-xl rounded-3xl p-10 border border-white/20 shadow-2xl">

    <h1 class="text-4xl font-bold text-white text-center mb-3">
        Welcome Back 👋
    </h1>

    <p class="text-center text-gray-300 mb-8">
        Login to AI Resume Analyzer
    </p>

    <form method="POST" action="/login" class="space-y-6" onsubmit="return validateLogin()">

        <!-- Email -->
        <div class="relative">
            <input
                id="email"
                type="email"
                name="email"
                required
                placeholder=" "
                class="peer w-full p-4 rounded-xl bg-white text-black focus:ring-4 focus:ring-cyan-400 outline-none transition"
            >

            <label
                class="absolute left-4 top-4 text-gray-500 transition-all
                       peer-focus:top-1 peer-focus:text-xs peer-focus:text-cyan-600
                       peer-valid:top-1 peer-valid:text-xs">
                Email Address
            </label>
        </div>

        <!-- Password -->
        <div class="relative">
            <input
                id="password"
                type="password"
                name="password"
                required
                placeholder=" "
                class="peer w-full p-4 rounded-xl bg-white text-black focus:ring-4 focus:ring-purple-400 outline-none transition"
            >

            <label
                class="absolute left-4 top-4 text-gray-500 transition-all
                       peer-focus:top-1 peer-focus:text-xs peer-focus:text-purple-600
                       peer-valid:top-1 peer-valid:text-xs">
                Password
            </label>

            <button
                type="button"
                onclick="togglePassword()"
                class="absolute right-4 top-4 text-gray-600 hover:scale-110 transition"
            >
                👁
            </button>
        </div>

        <div class="text-right">
            <a href="/forgot-password"
               class="text-cyan-400 hover:underline text-sm">
                Forgot Password?
            </a>
        </div>

        <button
            type="submit"
            class="w-full py-4 rounded-xl text-white font-bold bg-gradient-to-r from-cyan-500 to-purple-600 hover:scale-105 transition duration-300"
        >
            Login
        </button>

    </form>

    <p class="text-center text-gray-300 mt-6">
        New User?
        <a href="/signup" class="text-cyan-400 font-bold hover:underline">
            Create Account
        </a>
    </p>

</div>

<script>
function togglePassword() {
    let password = document.getElementById("password");

    if (password.type === "password") {
        password.type = "text";
    } else {
        password.type = "password";
    }
}

function validateLogin() {
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value;

    // Strict email validation
    const emailPattern = /^[A-Za-z0-9._%+-]{3,}@[A-Za-z0-9-]{3,}\.[A-Za-z]{2,}$/;

    if (!emailPattern.test(email)) {
        Swal.fire({
            icon: "error",
            title: "Invalid Email",
            text: "Enter a valid email like name@gmail.com"
        });
        return false;
    }

    if (password.length < 8) {
        Swal.fire({
            icon: "error",
            title: "Weak Password",
            text: "Password must be at least 8 characters."
        });
        return false;
    }

    return true;
}
</script>

</body>
</html>
