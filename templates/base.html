
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}AI Resume Analyzer{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        html { scroll-behavior: smooth; }

        body {
            font-family: Inter, Arial, sans-serif;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-18px); }
            100% { transform: translateY(0px); }
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        .nav-link {
            position: relative;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #22d3ee;
        }

        .nav-link::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -6px;
            width: 0%;
            height: 2px;
            background: linear-gradient(to right, cyan, purple);
            transition: 0.3s;
        }

        .nav-link:hover::after {
            width: 100%;
        }
    </style>
</head>

<body class="bg-[#09090B] text-white min-h-screen">

<!-- Loading Overlay -->
<div id="loadingOverlay"
     class="hidden fixed inset-0 z-50 bg-black/80 backdrop-blur-md flex items-center justify-center">
    <div class="text-center">
        <div class="w-20 h-20 border-4 border-cyan-400 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
        <h2 class="text-3xl font-bold mb-4">Analyzing Resume...</h2>
        <p id="loadingText" class="text-gray-300 text-lg">
            Uploading PDF...
        </p>
    </div>
</div>

<!-- Background -->
<div class="fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute top-20 left-20 w-96 h-96 bg-purple-500 rounded-full blur-3xl opacity-20 floating"></div>
    <div class="absolute bottom-20 right-20 w-96 h-96 bg-cyan-500 rounded-full blur-3xl opacity-20 floating"></div>
</div>

<!-- Navbar -->
<header class="sticky top-0 z-40 bg-black/30 backdrop-blur-xl border-b border-white/10">
    <div class="max-w-7xl mx-auto px-8 py-5 flex justify-between items-center">

        <div>
            <h1 class="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">
                AI Resume Analyzer
            </h1>
        </div>

        <nav class="flex items-center gap-8 font-medium">

            <a href="/dashboard" class="nav-link">Dashboard</a>

            <a href="/history" class="nav-link">Analysis History</a>

            <a href="/ranking" class="nav-link">Rankings</a>

            <a href="/analyzer" class="nav-link">Analyze Resume</a>

            <a href="/profile" class="nav-link">Profile</a>

            <a href="/logout"
               class="px-4 py-2 rounded-xl bg-red-500/20 hover:bg-red-500/30 transition">
                Logout
            </a>
        </nav>
    </div>
</header>

<!-- Main -->
<main class="max-w-7xl mx-auto px-8 py-10">
    {% block content %}
    {% endblock %}
</main>

<script>
function showLoading() {
    const overlay = document.getElementById("loadingOverlay");
    const text = document.getElementById("loadingText");

    overlay.classList.remove("hidden");

    const messages = [
        "Uploading PDF...",
        "Extracting Resume Text...",
        "Matching Skills...",
        "Computing ATS Score...",
        "Generating AI Insights..."
    ];

    let i = 0;
    const interval = setInterval(() => {
        i++;
        if (i < messages.length) {
            text.innerText = messages[i];
        } else {
            clearInterval(interval);
        }
    }, 900);
}
</script>

</body>
</html>
